# Cartographer macros — wrapped CARTOGRAPHER_* commands for Fluidd buttons.
#
# Naming convention: every macro here starts with CARTO_ so Fluidd's
# alphabetical macros panel groups them together.
#
# Plate names (pei, coolplate, default) match the canonical K2 Plus
# convention for saved scan_model / touch_model / bed_mesh profiles.

# ===== SCAN MODEL CALIBRATION (manual, ~3 min each) =====

[gcode_macro CARTO_CALIBRATE_DEFAULT]
description: Calibrate Cartographer SCAN model for the default plate (manual, ~3 min)
gcode:
    CARTOGRAPHER_SCAN_CALIBRATE METHOD=manual MODEL=default

[gcode_macro CARTO_CALIBRATE_PEI]
description: Calibrate Cartographer SCAN model for PEI plate (manual, ~3 min)
gcode:
    CARTOGRAPHER_SCAN_CALIBRATE METHOD=manual MODEL=pei

[gcode_macro CARTO_CALIBRATE_COOLPLATE]
description: Calibrate Cartographer SCAN model for Coolplate (manual, ~3 min)
gcode:
    CARTOGRAPHER_SCAN_CALIBRATE METHOD=manual MODEL=coolplate

# ===== TOUCH MODEL CALIBRATION =====

[gcode_macro CARTO_TOUCH_CAL_DEFAULT]
description: Calibrate Cartographer TOUCH model for the default plate
gcode:
    CARTOGRAPHER_TOUCH_CALIBRATE MODEL=default

[gcode_macro CARTO_TOUCH_CAL_PEI]
description: Calibrate Cartographer TOUCH model for PEI plate
gcode:
    CARTOGRAPHER_TOUCH_CALIBRATE MODEL=pei

[gcode_macro CARTO_TOUCH_CAL_COOLPLATE]
description: Calibrate Cartographer TOUCH model for Coolplate
gcode:
    CARTOGRAPHER_TOUCH_CALIBRATE MODEL=coolplate

# ===== LOAD SAVED MODELS =====

[gcode_macro CARTO_LOAD_DEFAULT]
description: Load default scan + touch models
gcode:
    CARTOGRAPHER_SCAN_MODEL LOAD=default
    CARTOGRAPHER_TOUCH_MODEL LOAD=default

[gcode_macro CARTO_LOAD_PEI]
description: Load PEI scan + touch models
gcode:
    CARTOGRAPHER_SCAN_MODEL LOAD=pei
    CARTOGRAPHER_TOUCH_MODEL LOAD=pei

[gcode_macro CARTO_LOAD_COOLPLATE]
description: Load Coolplate scan + touch models
gcode:
    CARTOGRAPHER_SCAN_MODEL LOAD=coolplate
    CARTOGRAPHER_TOUCH_MODEL LOAD=coolplate

# ===== UTILITY / DEBUG =====

[gcode_macro CARTO_TOUCH_HOME]
description: Z-reference the toolhead by touching the bed (replaces G28 Z)
gcode:
    CARTOGRAPHER_TOUCH_HOME

[gcode_macro CARTO_LIST_MODELS]
description: List all saved scan and touch models in the console
gcode:
    RESPOND TYPE=command MSG="--- Scan models ---"
    CARTOGRAPHER_SCAN_MODEL LIST
    RESPOND TYPE=command MSG="--- Touch models ---"
    CARTOGRAPHER_TOUCH_MODEL LIST

[gcode_macro CARTO_INFO]
description: Show Cartographer probe firmware/hardware info
gcode:
    CARTOGRAPHER_QUERY
