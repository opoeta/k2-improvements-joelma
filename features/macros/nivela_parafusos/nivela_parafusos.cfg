# NIVELA_PARAFUSOS - nivelamento com relatorio claro em portugues
# Traduz a saida do SCREWS_TILT_CALCULATE: diz se APERTA ou SOLTA,
# quanto girar e se o canto esta alto ou baixo.

[gcode_macro NIVELA_PARAFUSOS]
description: Nivela os parafusos da mesa com relatorio em portugues. Uso: NIVELA_PARAFUSOS [BED_TEMP=60]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|int %}
  {% if BED_TEMP > 0 %}
    RESPOND MSG="[NIVELA] Aquecendo mesa a {BED_TEMP}C (BED_TEMP=0 pula o aquecimento)"
    M140 S{BED_TEMP}
  {% endif %}
  HOME_IF_NEEDED
  {% if BED_TEMP > 0 %}
    M190 S{BED_TEMP}
  {% endif %}
  SCREWS_TILT_CALCULATE
  _RELATORIO_PARAFUSOS
  RESPOND MSG="[NIVELA] Mesa segue aquecida para a proxima medicao - ao terminar rode TURN_OFF_HEATERS"

[gcode_macro _RELATORIO_PARAFUSOS]
description: Traduz o resultado do screws_tilt_adjust
gcode:
  {% set r = printer.screws_tilt_adjust.results %}
  {% if printer.screws_tilt_adjust.error %}
    RESPOND TYPE="error" MSG="[NIVELA] Erro na medicao - diferenca muito grande ou probe falhou. Ajuste grosseiro e rode de novo."
  {% elif not r %}
    RESPOND MSG="[NIVELA] Sem resultados ainda - rode NIVELA_PARAFUSOS."
  {% else %}
    {% set nomes = {'screw4': 'TRASEIRO ESQ ', 'screw3': 'TRASEIRO DIR ', 'screw1': 'FRENTE   ESQ ', 'screw2': 'FRENTE   DIR '} %}
    {% set base = namespace(z=0) %}
    {% for n, d in r.items() %}{% if d.get('is_base') %}{% set base.z = d.z %}{% endif %}{% endfor %}
    RESPOND MSG="[NIVELA] ========= MAPA DA MESA (vista de cima, frente = voce) ========="
    {% for chave in ['screw4', 'screw3', 'screw1', 'screw2'] %}
      {% set d = r[chave] %}
      {% set nome = nomes[chave] %}
      {% if d.get('is_base') %}
        RESPOND MSG="[NIVELA] {nome}: BASE (referencia - NAO MEXER)"
      {% else %}
        {% set partes = d.get('adjust_raw', d.adjust).split(':') %}
        {% set voltas = partes[0]|int %}
        {% set mins = partes[1]|int %}
        {% set total = voltas * 60 + mins %}
        {% set delta = (d.z - base.z)|round(3) %}
        {% if total <= 3 %}
          RESPOND MSG="[NIVELA] {nome}: OK ({delta}mm - nao precisa mexer)"
        {% else %}
          {% set graus = mins * 6 %}
          {% if voltas > 0 %}
            {% set qtd = voltas|string + ' volta(s)' + (' + ' + graus|string + ' graus' if graus > 0 else '') %}
          {% else %}
            {% set qtd = graus|string + ' graus' %}
          {% endif %}
          {% if d.sign == 'CW' %}
            RESPOND MSG="[NIVELA] {nome}: APERTAR {qtd} (girar HORARIO) - canto ALTO {delta|abs}mm, vai DESCER"
          {% else %}
            RESPOND MSG="[NIVELA] {nome}: SOLTAR {qtd} (girar ANTI-horario) - canto BAIXO {delta|abs}mm, vai SUBIR"
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    RESPOND MSG="[NIVELA] ==============================================================="
    RESPOND MSG="[NIVELA] Regra: APERTAR desce o canto / SOLTAR sobe o canto"
    RESPOND MSG="[NIVELA] Ajuste os indicados e rode NIVELA_PARAFUSOS de novo ate tudo OK"
  {% endif %}
