# NIVELA_PARAFUSOS - nivelamento com relatorio claro em portugues
# Traduz a saida do SCREWS_TILT_CALCULATE: diz se o canto SOBE ou DESCE,
# quanto girar e o sentido do knob (Klipper CW-M4: HORARIO = canto sobe).
#
# Por que aquece o BICO: o probe da K2 e a celula de carga do proprio bico
# (prtouch). O firmware proba o mesh com bico a 140C; medir com bico frio
# da Z errado e DERIVA conforme o bico esquenta perto da mesa quente -
# era uma das causas de "cada medicao da um valor diferente".
# A outra causa: Z_TILT_ADJUST re-convergia antes de CADA medicao. Use
# TILT=0 nas re-medicoes para manter a MESMA referencia dos fusos.

[gcode_macro NIVELA_PARAFUSOS]
description: Nivela os parafusos da mesa. Uso: NIVELA_PARAFUSOS [BED_TEMP=60] [NOZ_TEMP=140] [TILT=1]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|int %}
  {% set NOZ_TEMP = params.NOZ_TEMP|default(140)|int %}
  {% set TILT = params.TILT|default(1)|int %}
  # NUNCA usar ';' '#' ou '*' dentro de MSG: o parser de gcode do Klipper corta
  # comentario nesses chars IGNORANDO aspas -> "Malformed command" e macro morta.
  {% set tinha_home = 'z' in printer.toolhead.homed_axes %}
  {% if BED_TEMP > 0 %}
    RESPOND MSG="[NIVELA] Aquecendo mesa a {BED_TEMP}C (BED_TEMP=0 pula o aquecimento)"
    M140 S{BED_TEMP}
  {% endif %}
  {% if NOZ_TEMP > 0 %}
    RESPOND MSG="[NIVELA] Aquecendo bico a {NOZ_TEMP}C - o probe e o bico, medir frio da Z errado"
    M104 S{NOZ_TEMP}
  {% endif %}
  HOME_IF_NEEDED
  {% if NOZ_TEMP > 0 %}
    M109 S{NOZ_TEMP}
  {% endif %}
  {% if BED_TEMP > 0 %}
    M190 S{BED_TEMP}
  {% endif %}
  # TILT=0 pula o G28 Z do wrapper. Se o home aconteceu AGORA (HOME_IF_NEEDED
  # acima, com bico ainda esquentando), a referencia e nova e fria - re-homeia
  # Z ja quente pra nao fingir que e a mesma referencia da rodada anterior.
  {% if TILT == 0 and not tinha_home %}
    RESPOND MSG="[NIVELA] Nao havia home - re-homeando Z com bico quente (referencia anterior perdida)"
    G28 Z
  {% endif %}
  SCREWS_TILT_CALCULATE TILT={TILT}
  _RELATORIO_PARAFUSOS
  {% if BED_TEMP > 0 or NOZ_TEMP > 0 %}
    RESPOND MSG="[NIVELA] Aquecedores seguem ligados para a proxima medicao - ao terminar rode TURN_OFF_HEATERS"
  {% else %}
    RESPOND MSG="[NIVELA] Medicao fria concluida"
  {% endif %}

[gcode_macro _RELATORIO_PARAFUSOS]
description: Traduz o resultado do screws_tilt_adjust
gcode:
  {% set r = printer.screws_tilt_adjust.results %}
  {% if printer.screws_tilt_adjust.error %}
    RESPOND TYPE="error" MSG="[NIVELA] Erro na medicao - diferenca muito grande ou probe falhou. Ajuste grosseiro e rode de novo."
  {% elif not r %}
    RESPOND MSG="[NIVELA] Sem resultados ainda - rode NIVELA_PARAFUSOS."
  {% else %}
    {% set nomes = {'screw4': 'TRASEIRO ESQ ', 'screw3': 'TRASEIRO DIR ', 'screw1': 'FRENTE   ESQ ', 'screw2': 'FRENTE   DIR '} %}
    {% set base = namespace(z=0) %}
    {% for n, d in r.items() %}{% if d.get('is_base') %}{% set base.z = d.z %}{% endif %}{% endfor %}
    RESPOND MSG="[NIVELA] ========= MAPA DA MESA (vista de cima, frente = voce) ========="
    {% for chave in ['screw4', 'screw3', 'screw1', 'screw2'] %}
      {% set d = r.get(chave) %}
      {% set nome = nomes[chave] %}
      {% if not d %}
        RESPOND MSG="[NIVELA] {nome}: sem leitura"
      {% elif d.get('is_base') %}
        RESPOND MSG="[NIVELA] {nome}: BASE (referencia - NAO MEXER)"
      {% else %}
        {% set partes = d.get('adjust_raw', d.adjust).split(':') %}
        {% set voltas = partes[0]|int %}
        {% set mins = partes[1]|int %}
        {% set total = voltas * 60 + mins %}
        {% set delta = (d.z - base.z)|round(3) %}
        {% if total <= 3 %}
          RESPOND MSG="[NIVELA] {nome}: OK ({delta}mm - nao precisa mexer)"
        {% else %}
          {% set graus = mins * 6 %}
          {% if voltas > 0 %}
            {% set qtd = voltas|string + ' volta(s)' + (' + ' + graus|string + ' graus' if graus > 0 else '') %}
          {% else %}
            {% set qtd = graus|string + ' graus' %}
          {% endif %}
          # sign=CW <=> canto probado ABAIXO da base <=> SUBIR (girar horario).
          # Convencao Klipper CW-M4 confirmada com fonte + teste fisico jul/2026.
          {% if d.sign == 'CW' %}
            RESPOND MSG="[NIVELA] {nome}: SUBIR o canto {qtd} (girar HORARIO) - esta {delta|abs}mm BAIXO"
          {% else %}
            RESPOND MSG="[NIVELA] {nome}: DESCER o canto {qtd} (girar ANTI-horario) - esta {delta|abs}mm ALTO"
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    RESPOND MSG="[NIVELA] ==============================================================="
    RESPOND MSG="[NIVELA] Regra (Klipper CW-M4): girar HORARIO sobe o canto / ANTI-horario desce"
    RESPOND MSG="[NIVELA] Ajuste os indicados e rode a re-medicao (TILT=0) ate tudo OK"
  {% endif %}
