# Ativa o objeto [mmu] (arquivo mmu.py em klippy/extras) que simula um MMU
# a partir do CFS, para o OrcaSlicer sincronizar cor/material via Moonraker.
# Ver features/macros/orca-filament-sync/README.md.
[mmu]
id: 0
# num_boxes: quantas caixas CFS o painel MMU mostra.
#   0 = auto (so caixas com state connect ou slot ocupado)  [padrao]
#   1..4 = forca a quantidade.
# Ajuste SEM editar arquivo: SET_MMU_BOXES BOXES=n no console (persiste em
# ~/printer_data/config/.joelma_mmu.json e tem precedencia sobre este cfg);
# ou pelo seletor no card CFS da Central.
#num_boxes: 0
