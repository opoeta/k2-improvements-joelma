# [save_variables] da Joelma - variaveis persistentes via comando SAVE_VARIABLE.
# Usado pelo Z-offset por placa+material: a Central grava zoff_<material>_<placa>
# e o START_PRINT aplica sozinho a cada impressao dessa combinacao.
#
# O ARQUIVO DE DADOS (joelma_vars.cfg) vive no printer_data, FORA do repo:
# sobrevive a restart do Klipper, a re-install e a update do repo (o instalador
# nunca o toca). NAO mover para /tmp (tmpfs - perderia tudo no boot).
#
# Guarda de instalacao: o install.sh so inclui este arquivo se NENHUM outro cfg
# ja definir [save_variables] (secao duplicada mata o Klipper no boot).
[save_variables]
filename: /mnt/UDISK/printer_data/config/joelma_vars.cfg
