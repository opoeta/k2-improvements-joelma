# if unintended changes are made to this file, restore with:
#   git -C /mnt/UDISK/root/k2-improvements restore features/macros/start_print/start_print.cfg

[gcode_macro _START_PRINT_VARS]
######################################################################
# copy this to overrides.cfg or edit here
######################################################################
variable_offset_PLA: 0
variable_offset_PETG: 0
variable_offset_ABS: 0
variable_offset_ASA: 0
variable_offset_DEFAULT: 0
variable_offset_PROBE: 0
variable_offset_placa_textured: 0
variable_offset_placa_smooth: 0
variable_heat_soak: 0 # minutes
gcode:


[gcode_macro START_PRINT]
# be sure to update your slicer machine gcode to pass in both chamber temp and material type:
# START_PRINT EXTRUDER_TEMP=[nozzle_temperature_initial_layer] BED_TEMP=[bed_temperature_initial_layer_single] CHAMBER_TEMP=[overall_chamber_temperature] MATERIAL={filament_type[initial_tool]}
gcode:
  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Start print macro called with {params}"
  BOX_START_PRINT
  G90
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
  {% set EXTRUDER_WAITTEMP = 140 %}
  {% set MATERIAL = params.MATERIAL|default("")|string %}
  {% set SOAK_TIME = params.SOAK_TIME|default(printer["gcode_macro _START_PRINT_VARS"].heat_soak)|float %}
  {% set NEEDS_HEAT_BUMP = MATERIAL in ["ASA", "ABS"] %}
  {% set ADAPTIVE = params.ADAPTIVE|default(0)|int %}
  # Deteccao da placa via CURR_BED_TYPE do slicer (Textured/Smooth PEI)
  {% set RAW_BED = params.CURR_BED_TYPE|default('')|lower %}
  {% set PLACA = 'textured' if 'textur' in RAW_BED else 'smooth' %}
  {% set OFFSET_PLACA = printer["gcode_macro _START_PRINT_VARS"].get("offset_placa_" + PLACA, 0)|float %}

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Preheating: Nozzle={EXTRUDER_WAITTEMP}C Bed={BED_TEMP}C Chamber={CHAMBER_TEMP}C"
  M104 S{EXTRUDER_WAITTEMP}
  M140 S{BED_TEMP}
  {% if CHAMBER_TEMP > 0 %}
    M141 S{CHAMBER_TEMP}
  {% endif %}

  {% if MATERIAL == "" %}
    {% set OFFSET = printer["gcode_macro _START_PRINT_VARS"].offset_default %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="WARNING: Material type not passed into START_PRINT! Using default Z offset of {OFFSET}. See start_print.cfg for slicer setup." TYPE=error
  {% else %}
    {% set OFFSET = printer["gcode_macro _START_PRINT_VARS"].get("offset_" + MATERIAL|lower, printer["gcode_macro _START_PRINT_VARS"].offset_default) %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Setting Z offset of {OFFSET} for {MATERIAL}"
  {% endif %}
  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Placa {PLACA}: offset adicional {OFFSET_PLACA}"
  SET_GCODE_OFFSET Z={OFFSET|float + OFFSET_PLACA}

  HOME_IF_NEEDED

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Waiting for bed to reach {BED_TEMP}°C..."
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP - 0.5} MAXIMUM={BED_TEMP + 1}

  # soak countdown
  {% for i in range(0, (SOAK_TIME * 60) | int, 60) %}
    {% set COUNTDOWN = (SOAK_TIME * 60) | int - i %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Soaking: {COUNTDOWN // 60} min {COUNTDOWN % 60} sec left"
    G4 P{(60000 if COUNTDOWN > 60 else COUNTDOWN * 1000)}
  {% endfor %}

  {% if CHAMBER_TEMP > 40 %} #No chamber heater/wait temp if temp < 40. Change if needed.
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Waiting for chamber to reach {CHAMBER_TEMP}°C..."
    M191 S{CHAMBER_TEMP}
  {% endif %}

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Rehoming Z after reaching bedtemp/soak"
  G28 Z

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Adjusting bed tilt..."
  Z_TILT_ADJUST

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Waiting for extruder to reach {EXTRUDER_WAITTEMP}°C..."
  M109 S{EXTRUDER_WAITTEMP}

# Carto/pr mesh logic
  {% if printer.cartographer %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Carto meshing bed"
    BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Setting Z offset with carto after nozzle clean..."
    BOX_NOZZLE_CLEAN
    CARTOGRAPHER_TOUCH_HOME
  {% elif ADAPTIVE == 1 %}
    # Mesh adaptativo KAMP: sonda apenas a area da peca (exige Label objects no slicer)
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Mesh adaptativo da area da peca (KAMP)"
    BOX_NOZZLE_CLEAN
    Z_TILT_ADJUST
    G28 Z
    BED_MESH_CALIBRATE
  {% else %}
    MESH_IF_NEEDED BED_TEMP={BED_TEMP} CHAMBER_TEMP={CHAMBER_TEMP}
    {% set mesh_name = BED_TEMP|string + 'c_' + CHAMBER_TEMP|string + 'c' %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Loading bed mesh: {mesh_name}..."
    BED_MESH_PROFILE LOAD={mesh_name}
  {% endif %}
  BOX_GO_TO_EXTRUDE_POS

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Setting extruder to {EXTRUDER_TEMP}°C..."
  M109 S{EXTRUDER_TEMP}
  G0 Y350
  {% if NEEDS_HEAT_BUMP and CHAMBER_TEMP > 0 %}
    {% set BUMPED_TEMP = [CHAMBER_TEMP + 5, 60]|min %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Applying heat bump for {MATERIAL}: chamber {CHAMBER_TEMP}°C -> {BUMPED_TEMP}°C..."
    M141 S{BUMPED_TEMP}
  {% endif %}

  SET_PIN PIN=extruder_fan VALUE=1
  M220 S100
  G21
  SET_VELOCITY_LIMIT ACCEL=5000 ACCEL_TO_DECEL=5000 SQUARE_CORNER_VELOCITY=10
  G92 E0

  STATUS_MSG PREFIX="[START_PRINT]:" MSG="Start_Print macro has finished"



[gcode_macro _BOX_PURGE_ON_CHANGE]
description: Flush + limpeza do bico no inicio do print (incondicional)
# Roda logo APOS o T[n] do slicer carregar o filamento inicial: purga purge_mm
# (fracionado em 3 passes, com limpeza no pad entre cada) e limpa o bico pra
# comecar a peca sem sujeira nem cor velha sangrando.
# INCONDICIONAL de proposito: a deteccao por slot (box.T1.filament) nao era
# confiavel atravessando o T[n] - as vezes o box nao virava a tempo e o flush
# nao disparava, entao a cor velha passava. Aqui sempre limpamos bem.
# purge_mm e tunavel (variable abaixo ou param PURGE= na chamada).
# Nome mantido por compatibilidade com a chamada ja presente nos templates.
variable_purge_mm: 90
gcode:
  {% set mm = params.PURGE|default(printer["gcode_macro _BOX_PURGE_ON_CHANGE"].purge_mm)|float %}
  {% set quente = printer.extruder.temperature|float >= 170 %}
  {% if mm > 0 and quente %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Flush de {mm}mm e limpeza do bico antes de imprimir"
    SET_VELOCITY_LIMIT ACCEL=5000 ACCEL_TO_DECEL=5000
    {% set passes = 3 %}
    {% for p in range(passes) %}
      BOX_GO_TO_EXTRUDE_POS
      M83
      G1 E{(mm / passes * 0.9)|round(2)} F300
      G1 E{(mm / passes * 0.1)|round(2)} F60
      M400
      M106 S255
      G4 P1500
      M106 S0
      G1 E-1.0 F1800
      BOX_NOZZLE_CLEAN
    {% endfor %}
  {% else %}
    STATUS_MSG PREFIX="[START_PRINT]:" MSG="Bico frio ou purge_mm=0 - flush pulado por seguranca"
  {% endif %}

  # Helper macros
[gcode_macro STATUS_MSG]
gcode:
  {% set MESSAGE = params.MSG|default('')|string %}
  {% set TYPE = params.TYPE|default('echo')|string %}
  {% set PREFIX = params.PREFIX|default('')|string %}
  {% set DISPLAY = params.DISPLAY|default('yes')|lower in ['yes', 'true', '1'] %}
  {% if DISPLAY %}
    M117 {MESSAGE}
  {% endif %}
  {% if TYPE == "error" %}
    RESPOND TYPE=error MSG="{MESSAGE}"
  {% else %}
    RESPOND PREFIX="{PREFIX}" MSG="{MESSAGE}"
  {% endif %}

[gcode_macro HOME_IF_NEEDED]
description: Homes axes when needed. Usage: HOME_IF_NEEDED [AXIS=<x|y|z|xy|xyz|etc>]
gcode:
  {% set homed = printer.toolhead.homed_axes %}
  {% set axis = params.AXIS|default("xyz")|lower %}
  
  {% set needs_x = "x" in axis and "x" not in homed %}
  {% set needs_y = "y" in axis and "y" not in homed %}
  {% set needs_z = "z" in axis and "z" not in homed %}
  
  {% if needs_z %}
    # G28 Z sem XY homeado falha no Klipper ("Must home X and Y axes first") -
    # se X/Y tambem faltam, homeia tudo de uma vez
    {% if needs_x or needs_y %}
      G28
    {% else %}
      G28 Z
    {% endif %}
  {% elif needs_x or needs_y %}
    # Home Y first to avoid homing X while inside the back corridor
    G28 X Y
  {% endif %}
