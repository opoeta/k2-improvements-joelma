# Overrides da Joelma - editar AQUI (no GitHub); re-install aplica na impressora

[virtual_sdcard]
forced_leveling: false

[bed_mesh]
probe_count: 5,5  # prtouch = toque fisico do bico; 25 pontos. (19x19+ so com cartographer)

# Painel de ajustes do START_PRINT
# offsets em mm; negativo aproxima o bico da mesa
#
# PRIORIDADE: se existir um Z-offset salvo por placa+material (Central ->
# "Salvar offset atual", gravado via SAVE_VARIABLE como zoff_<material>_<placa>
# no joelma_vars.cfg), o START_PRINT usa ELE como offset total e IGNORA a soma
# offset_<material> + offset_placa_<placa> abaixo. Estes valores legados so
# valem pra combinacoes sem offset salvo.
[gcode_macro _START_PRINT_VARS]
variable_offset_PLA: 0
variable_offset_PETG: 0
variable_offset_ABS: 0
variable_offset_ASA: 0
variable_offset_DEFAULT: 0
variable_offset_PROBE: 0
variable_offset_placa_textured: 0
variable_offset_placa_smooth: 0
variable_heat_soak: 0 # minutos
gcode:
