# Blindagem do bug key171/key60 do firmware da Creality (CFS).
#
# BOX_INFO_REFRESH emite internamente "BOX_SET_PRE_LOADING ADDR= NUM= ACTION=RUN"
# com os parametros VAZIOS; dentro do modulo compilado da Creality
# (box_wrapper.cpython-39.so — sem fonte publicado) isso vira None e o Klipper
# cai em shutdown:
#   key171: Unable to parse 'BOX_SET_PRE_LOADING ADDR= NUM= ACTION=RUN'
#   !! unsupported operand type(s) for &=: 'NoneType' and 'int'
#   key60:  Internal error on command:BOX_INFO_REFRESH
#
# O BOX_INFO_REFRESH emite uma SEQUENCIA de comandos internos com parametros
# vazios (validado ao vivo em jul/2026): primeiro BOX_SET_PRE_LOADING, depois
# BOX_GET_RFID — cada um derruba o Klipper do mesmo jeito. Como todos passam
# pelo interpretador de G-code, cada override intercepta ANTES do modulo
# quebrado: ADDR/NUM vazios viram no-op logado; chamadas legitimas seguem
# intactas (rawparams) para o comando original.
# Se o console mostrar key171 de OUTRO comando BOX_* com ADDR=/NUM= vazios,
# adicione aqui um bloco identico para ele.
# Recuperacao caso algo mude no firmware: FIRMWARE_RESTART.
# Ver docs/JOELMA-HANDOFF.md secao 7.1.

[gcode_macro BOX_SET_PRE_LOADING]
rename_existing: _OG_BOX_SET_PRE_LOADING
description: Guarda contra ADDR/NUM vazios (bug key171/key60 da Creality)
gcode:
  {% if params.ADDR|default("")|trim != "" and params.NUM|default("")|trim != "" %}
    _OG_BOX_SET_PRE_LOADING {rawparams}
  {% else %}
    {action_respond_info("BOX_SET_PRE_LOADING ignorado: ADDR/NUM vazios (bug key171/key60 evitado)")}
  {% endif %}

[gcode_macro BOX_GET_RFID]
rename_existing: _OG_BOX_GET_RFID
description: Guarda contra ADDR/NUM vazios (bug key171/key60 da Creality)
gcode:
  {% if params.ADDR|default("")|trim != "" and params.NUM|default("")|trim != "" %}
    _OG_BOX_GET_RFID {rawparams}
  {% else %}
    {action_respond_info("BOX_GET_RFID ignorado: ADDR/NUM vazios (bug key171/key60 evitado)")}
  {% endif %}
