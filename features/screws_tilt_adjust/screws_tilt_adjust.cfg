[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: _OG_SCREWS_TILT_CALCULATE
gcode:
    # TILT=1 (default): alinha os fusos motorizados (Z_TILT_ADJUST) e re-homeia
    # Z antes de medir - referencia limpa no comeco de uma sessao.
    # TILT=0: mede DIRETO, sem mexer nos fusos - essencial pra comparar rodadas
    # consecutivas: o z_tilt re-converge diferente a cada rodada (dentro da
    # tolerancia) e era uma das causas de "cada medicao da um valor diferente".
    {% if params.TILT|default(1)|int == 1 %}
    Z_TILT_ADJUST
    G28 Z
    {% endif %}
    _OG_SCREWS_TILT_CALCULATE {rawparams}

[screws_tilt_adjust]
screw1: 45, 28
screw1_name: Dianteiro Esquerdo
screw2: 307, 28
screw2_name: Dianteiro Direito
screw3: 307, 314
screw3_name: Traseiro Direito
screw4: 45, 314
screw4_name: Traseiro Esquerdo
speed: 200
# altura de deslocamento ENTRE os pontos. Era 10mm -> subia/descia 10mm em cada
# parafuso (lento e "eleva muito"). 5mm corta pela metade o lift E a descida de
# aproximacao (o probe desce a 5mm/s, entao metade do curso = metade do tempo).
# 5mm ainda folga de sobra pra uma mesa quase plana. Se a mesa estiver muito
# torta antes de nivelar, suba pra 8.
horizontal_move_z: 5
screw_thread: CW-M4
