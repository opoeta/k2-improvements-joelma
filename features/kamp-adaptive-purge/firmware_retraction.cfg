# Klipper firmware retraction — optional companion to KAMP.
#
# Enables G10 (retract) and G11 (unretract) commands. KAMP's LINE_PURGE
# uses these for cleaner purge sequencing, and your slicer can also use
# them if you enable "Use firmware retraction" in filament settings.
#
# Defaults below are conservative for PLA on the K2 Plus direct-drive
# extruder. Tune per-filament via slicer profiles or override here:
#   PLA:  retract_length: 0.5
#   PETG: retract_length: 1.0–1.5  (some setups need 2.0)
#   ABS:  retract_length: 0.5–0.8
#   ASA:  retract_length: 0.5–0.8
#   TPU:  retract_length: 0  (or disable retraction entirely)
#
# These act as the GLOBAL defaults; slicer-emitted G10/G11 use these
# values. If you want per-filament retraction, either set them in the
# slicer (and ignore this), or use SET_RETRACTION RETRACT_LENGTH=...
# from a filament-load macro.

[firmware_retraction]
retract_length: 0.5
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35
