# KAMP settings tailored for K2 Plus on the firmware-1.1.5.2-compat branch.
# Override individual values in custom/overrides.cfg if you want different
# defaults — those override SAVE_CONFIG and survive feature reinstalls.

[gcode_macro _KAMP_Settings]
description: KAMP settings (K2 Plus defaults).
variable_verbose_enable: True

# Adaptive meshing options (unused on K2 Plus — cartographer plugin does its
# own adaptive meshing via `BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1`
# inside the k2-improvements START_PRINT macro). Left at sane defaults for
# completeness; the values are read only if you also include Adaptive_Meshing.cfg.
variable_mesh_margin: 0
variable_fuzz_amount: 0

# Dockable probe options — N/A on K2 Plus (cartographer is fixed-mounted).
variable_probe_dock_enable: False
variable_attach_macro: 'Attach_Probe'
variable_detach_macro: 'Dock_Probe'

# Adaptive line-purge settings.
#
# K2 Plus mesh region (with JimmyV back-mount) is X 5..345, Y 36..345.
# `purge_margin: 10` places the purge 10mm in front of the print's bbox.
# For prints that start at Y >= 50 the purge lands at Y >= 40 — inside mesh,
# so bed-mesh interpolation gives the correct nozzle height. For prints
# placed at the very front (Y 36-45), the purge can land at Y < mesh_min;
# bed-mesh extrapolation may give incorrect Z and the nozzle can graze the
# bed. Keep prints centered on the bed or increase purge_margin if you slice
# something front-aligned.
variable_purge_height: 0.4                   # Z position during purge — close enough for adhesion, well above mesh extrapolation noise.
variable_tip_distance: 0                     # Distance between filament tip and nozzle before purge (set if your PRINT_END retracts).
variable_purge_margin: 10                    # Distance in front of print's bbox for the purge.
variable_purge_amount: 25                    # mm of filament to purge (slightly more than KAMP default for clean transition).
variable_flow_rate: 12                       # mm³/s during purge — default; matches KAMP.

# Smart Park — parks toolhead near the print's bbox for final heat soak.
# Disabled by default since the k2-improvements START_PRINT macro already
# handles its own heat soak / nozzle clean cycle. Enable only if you remove
# that and want KAMP-driven parking.
variable_smart_park_height: 10

gcode:
    {action_respond_info(" KAMP_Settings macro is for storing settings only — no gcode runs here. ")}
