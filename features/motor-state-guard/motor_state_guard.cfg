# Motor state guard for K2 Plus
#
# Background:
#   The K2 Plus's proprietary motor wrapper (motor_control_wrapper.cpython-39.so
#   plus the external motor controllers at Serial_485 addresses 0x81-0x84)
#   retains direction state across klippy-only restarts. After a SAVE_CONFIG
#   (which triggers an internal `RESTART`) or a manual `RESTART` without a
#   mains power-cycle, the next G28 Y has been observed to home in the wrong
#   direction — driving the toolhead into the back frame.
#
#   FIRMWARE_RESTART resets the MCUs and clears the issue; mains power-cycle
#   is the documented cure. Empirically, no gcode command we have access to
#   (MOTOR_STALL_MODE, MOTOR_BOOT, RESET_HOME_AXES_XY, MOTOR_CLEAR_ERR_WARN_CODE)
#   reproduces the wrapper's full re-init handshake.
#
# What this guard does:
#   On every Klipper start, detect whether this was a real boot (power-cycle)
#   or a klippy-only restart by checking for a marker file in /tmp (tmpfs:
#   wiped on real boot, persists across klippy restart). If klippy-only, the
#   guard refuses G28 with an explanatory error until the user has actually
#   power-cycled OR explicitly acknowledges with POWER_CYCLED_OK.
#
# UX cost:
#   - After a real power-cycle: zero — G28 just works.
#   - After SAVE_CONFIG / RESTART / FIRMWARE_RESTART: G28 is blocked. User
#     must either power-cycle (recommended) or run POWER_CYCLED_OK if they
#     understand the risk.

[save_variables]
filename: /tmp/k2-motor-state-guard.cfg

[gcode_macro _motor_state]
variable_uncertain: 1
gcode:

[delayed_gcode _detect_klipper_restart]
initial_duration: 0.1
gcode:
    {% set was_running = printer["save_variables"].variables.was_running|default(0)|int %}
    {% if was_running == 1 %}
        SET_GCODE_VARIABLE MACRO=_motor_state VARIABLE=uncertain VALUE=1
        RESPOND TYPE=command MSG="Klipper-only restart detected. K2 Plus motor state may be stale — power-cycle the printer at the mains before homing, or run POWER_CYCLED_OK if you have already done so."
    {% else %}
        SET_GCODE_VARIABLE MACRO=_motor_state VARIABLE=uncertain VALUE=0
    {% endif %}
    SAVE_VARIABLE VARIABLE=was_running VALUE=1

[gcode_macro G28]
rename_existing: G28.1
description: Home axes; blocked after a Klipper-only restart until POWER_CYCLED_OK.
gcode:
    {% if printer["gcode_macro _motor_state"].uncertain|int == 1 %}
        { action_raise_error(
            "G28 blocked: K2 Plus motor state may be stale after a Klipper-only restart "
            "(SAVE_CONFIG / RESTART / FIRMWARE_RESTART without a mains power-cycle). "
            "Y homing direction has been observed to invert in this state, crashing the "
            "toolhead into the back frame. Power-cycle at the mains, then either re-issue "
            "G28 (the guard will auto-clear) or run POWER_CYCLED_OK to override manually."
        ) }
    {% endif %}
    G28.1 {rawparams}

[gcode_macro POWER_CYCLED_OK]
description: Override the motor-state guard; re-enables G28 without requiring detection of a power-cycle.
gcode:
    SET_GCODE_VARIABLE MACRO=_motor_state VARIABLE=uncertain VALUE=0
    RESPOND TYPE=command MSG="Motor state acknowledged — G28 enabled."
